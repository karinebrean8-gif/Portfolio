# =========================================================================
# @file docker-compose.yml
# @description Principle-Level Ultra-FAANG Monorepo Orchestration Engine.
# @architecture Distributed Microservices Network with Isolated Persistence Layers
# @systems 5 Application Kernels, 2 Production Databases, 1 Edge Reverse Proxy
# =========================================================================

version: '3.8'

# Global Networks Map for Cryptographic and Structural Isolation
networks:
  ingress_edge_network:
    driver: bridge
    name: faang_portfolio_ingress_network
  internal_persistence_network:
    driver: bridge
    name: faang_portfolio_storage_network
    internal: true # বাইরের পৃথিবী থেকে ডাটাবেস নেটওয়ার্ক সম্পূর্ণ ইনসুল্যার/লকড থাকবে

# Persistent Volume Storage Engines
volumes:
  postgres_enterprise_data:
    driver: local
  mysql_enterprise_data:
    driver: local
  shared_nginx_cache:
    driver: local

services:

  # =========================================================================
  # CORE EDGE INTELLIGENCE INTERFACE (Reverse Proxy & Load Balancer)
  # =========================================================================
  ingress_gateway:
    image: nginx:alpine
    container_name: faang_ingress_gateway
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - shared_nginx_cache:/var/cache/nginx
    networks:
      - ingress_edge_network
    depends_on:
      - node_ecommerce
      - node_portfolio
      - node_dashboard
      - node_chat
      - node_ai_engine
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  # =========================================================================
  # NODE 01: ENTERPRISE FULLSTACK E-COMMERCE ENGINE (React, Next, Django, Prisma)
  # =========================================================================
  node_ecommerce:
    build:
      context: .
      dockerfile: ./apps/ecommerce/web/Dockerfile
      target: production
    container_name: faang_node_ecommerce
    restart: on-failure:5
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:$${POSTGRES_PASSWORD}@storage_postgres:5432/portfolio_db?schema=public
    deploy:
      resources:
        limits:
          cpus: '1.50'
          memory: 2GB
        reservations:
          memory: 512M
    networks:
      - ingress_edge_network
      - internal_persistence_network
    depends_on:
      storage_postgres:
        condition: service_healthy

  # =========================================================================
  # NODE 02: DISTINGUISHED DEV PORTFOLIO REGISTRY (React, Next, Node, Express)
  # =========================================================================
  node_portfolio:
    build:
      context: .
      dockerfile: ./apps/portfolio/Dockerfile
    container_name: faang_node_portfolio
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 1GB
    networks:
      - ingress_edge_network
      - internal_persistence_network

  # =========================================================================
  # NODE 03: HIGH-THROUGHPUT ANALYTICS & DASHBOARD APP (React, Next, Redux)
  # =========================================================================
  node_dashboard:
    build:
      context: .
      dockerfile: ./apps/dashboard/Dockerfile
    container_name: faang_node_dashboard
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 1GB
    networks:
      - ingress_edge_network
      - internal_persistence_network

  # =========================================================================
  # NODE 04: MISSION-CRITICAL REAL-TIME CHAT APPLICATION (WebSockets/Node)
  # =========================================================================
  node_chat:
    build:
      context: .
      dockerfile: ./apps/chat-app/Dockerfile
    container_name: faang_node_chat
    restart: always
    environment:
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          cpus: '2.00'
          memory: 4GB
    networks:
      - ingress_edge_network
      - internal_persistence_network

  # =========================================================================
  # NODE 05: NEXT-GEN AUTONOMOUS AI + FULLSTACK INTEL HUB (Django REST, Prisma Infra)
  # =========================================================================
  node_ai_engine:
    build:
      context: .
      dockerfile: ./apps/ai-engine/Dockerfile
    container_name: faang_node_ai_engine
    restart: always
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://postgres:$${POSTGRES_PASSWORD}@storage_postgres:5432/portfolio_db
    deploy:
      resources:
        limits:
          cpus: '3.00'
          memory: 8GB
    networks:
      - ingress_edge_network
      - internal_persistence_network
    depends_on:
      storage_postgres:
        condition: service_healthy

  # =========================================================================
  # PERSISTENCE CORE: SECURITY HARDENED POSTGRESQL LAYER
  # =========================================================================
  storage_postgres:
    image: postgres:16-alpine
    container_name: faang_storage_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ultra_secure_pass_2026
      POSTGRES_DB: portfolio_db
    volumes:
      - postgres_enterprise_data:/var/lib/postgresql/data
    networks:
      - internal_persistence_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 2GB

  # =========================================================================
  # PERSISTENCE CORE: HIGH-READ PERFORMANCE MYSQL ENGINE
  # =========================================================================
  storage_mysql:
    image: mysql:8.0
    container_name: faang_storage_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ultra_secure_pass_2026
      MYSQL_DATABASE: portfolio_ecommerce
    volumes:
      - mysql_enterprise_data:/var/lib/mysql
    networks:
      - internal_persistence_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 2GB