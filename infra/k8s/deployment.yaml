
import {
  Award,
  ExternalLink,
  CheckCircle2,
  Calendar,
  Building2,
} from "lucide-react";

import { memo } from "react";


const CertificateViewer = memo(
({
  certificate,
  onClose,
}) => {

  if (!certificate) {
    return null;
  }


  const {
    title,
    issuer,
    provider,
    year,
    credential,
    skills = [],
    description,
    verified = false,
  } = certificate;


  const metadata = [
    {
      id: "issuer",
      label: "Issuer",
      value: issuer,
      icon: Building2,
    },
    {
      id: "year",
      label: "Issued",
      value: year,
      icon: Calendar,
    },
  ];



  return (

    <section
      role="dialog"
      aria-modal="true"
      aria-labelledby="certificate-title"
      className="
        fixed
        inset-0
        z-50
        flex
        items-center
        justify-center
        bg-black/70
        p-6
      "
    >

      <article
        className="
          w-full
          max-w-2xl
          rounded-3xl
          border
          border-slate-800
          bg-slate-950
          p-8
          text-white
          shadow-2xl
        "
      >

        <header
          className="
            flex
            items-start
            justify-between
            gap-6
          "
        >

          <div
            className="
              flex
              gap-4
            "
          >

            <div
              className="
                flex
                h-14
                w-14
                items-center
                justify-center
                rounded-2xl
                bg-emerald-500/10
                text-emerald-400
              "
            >
              <Award size={28}/>
            </div>


            <div>

              <h2
                id="certificate-title"
                className="
                  text-2xl
                  font-black
                "
              >
                {title}
              </h2>


              {
                verified && (
                  <span
                    className="
                      mt-2
                      inline-flex
                      items-center
                      gap-2
                      text-sm
                      text-emerald-400
                    "
                  >
                    <CheckCircle2 size={16}/>
                    Verified Certificate
                  </span>
                )
              }

            </div>

          </div>


          <button
            type="button"
            onClick={onClose}
            className="
              rounded-xl
              px-3
              py-2
              text-slate-400
              transition
              hover:bg-slate-800
              hover:text-white
            "
            aria-label="Close certificate viewer"
          >
            ✕
          </button>

        </header>



        {
          description && (
            <p
              className="
                mt-6
                leading-7
                text-slate-400
              "
            >
              {description}
            </p>
          )
        }



        <div
          className="
            mt-8
            grid
            gap-4
            sm:grid-cols-2
          "
        >

          {
            metadata.map(
              ({
                id,
                label,
                value,
                icon: Icon,
              }) => (

                <div
                  key={id}
                  className="
                    rounded-2xl
                    bg-slate-900
                    p-4
                  "
                >

                  <div
                    className="
                      flex
                      items-center
                      gap-2
                      text-sm
                      text-slate-400
                    "
                  >

                    <Icon size={16}/>

                    {label}

                  </div>


                  <p
                    className="
                      mt-2
                      font-semibold
                    "
                  >
                    {value}
                  </p>

                </div>

              )
            )
          }

        </div>




        {
          skills.length > 0 && (

            <div className="mt-8">

              <h3
                className="
                  text-sm
                  font-semibold
                  uppercase
                  tracking-wider
                  text-slate-400
                "
              >
                Skills
              </h3>


              <ul
                className="
                  mt-3
                  flex
                  flex-wrap
                  gap-2
                "
              >

                {
                  skills.map(
                    (skill)=>(
                      <li
                        key={skill}
                        className="
                          rounded-full
                          bg-slate-800
                          px-3
                          py-1
                          text-sm
                        "
                      >
                        {skill}
                      </li>
                    )
                  )
                }

              </ul>

            </div>

          )
        }




        <footer
          className="
            mt-8
            flex
            justify-end
          "
        >

          {
            credential && (

              <a
                href={credential}
                target="_blank"
                rel="noopener noreferrer"
                className="
                  inline-flex
                  items-center
                  gap-2
                  rounded-xl
                  bg-emerald-500
                  px-5
                  py-3
                  font-semibold
                  text-black
                  transition
                  hover:bg-emerald-400
                "
              >

                Verify Credential

                <ExternalLink size={18}/>

              </a>

            )
          }

        </footer>


      </article>

    </section>

  );

});


CertificateViewer.displayName =
  "CertificateViewer";


export default CertificateViewer;
