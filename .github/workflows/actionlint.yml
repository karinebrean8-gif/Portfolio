name: Lint GitHub Actions

on:
  push:
    branches:
      - main
      - develop
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"

  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"

  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: actionlint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  actionlint:

    name: Validate GitHub Actions Workflows

    runs-on: ubuntu-latest

    timeout-minutes: 15

    permissions:
      contents: read
      security-events: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
          fetch-depth: 1


      - name: Setup Python
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d
        with:
          python-version: "3.12"
          cache: pip


      - name: Run actionlint
        uses: rhysd/actionlint@03d0035246f3e81f36aed592ffb4bebf33a03106
        with:
          fail-on-error: true


      - name: Install zizmor
        run: |
          python -m pip install \
            --disable-pip-version-check \
            zizmor==1.25.2


      - name: Run zizmor security analysis
        continue-on-error: true
        run: |
          zizmor \
            --format sarif \
            --output zizmor-results.sarif \
            .


      - name: Upload security report
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: zizmor-results.sarif


      - name: Workflow validation summary
        if: always()
        shell: bash
        run: |
          {
            echo "## GitHub Actions Validation"
            echo ""
            echo "- actionlint: executed"
            echo "- zizmor security scan: executed"
            echo "- Workflow security policy: checked"
          } >> "$GITHUB_STEP_SUMMARY"
